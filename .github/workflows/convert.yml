name: Conversor MarkItDown

on:
  push:
    paths:
      - 'inputs/**' # Só roda quando entra arquivo novo aqui

jobs:
  convert:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Code Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install MarkItDown
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Converter
      run: |
        for arquivo in inputs/*; do
          if [ -f "$arquivo" ] && [ "$(basename "$arquivo")" != ".gitkeep" ]; then
            nome_completo=$(basename "$arquivo")
            nome_sem_ext="${nome_completo%.*}"
            python converter.py "$arquivo" "outputs/$nome_sem_ext.md"
          fi
        done

    - name: Save Markdown Files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add outputs/*.md
        git commit -m "Auto: Conversão via MarkItDown [skip ci]" || echo "Sem alterações"
        git push
